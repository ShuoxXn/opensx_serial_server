  <script>
    const passwordInput = document.getElementById('password');
    const eyeOpen = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');
    const loginButton = document.getElementById('loginButton');
    const loginForm = document.getElementById('login');
    const loginres = document.getElementById('loginres');

    const togglePasswordVisibility = () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOpen.style.display = isPassword ? 'block' : 'none';
      eyeClosed.style.display = isPassword ? 'none' : 'block';
    };

    const fetchData = async () => {
      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.fromEntries(new FormData(loginForm)))
      });

      if (response.ok) {
        const data = await response.text();
        console.log(data);
        if (data === "success") {
          loginForm.submit();
        } else {
          loginres.textContent = '登录失败, 请检查用户名和密码';
          loginres.style.color = "red";
          loginres.style.textAlign = "center";
          loginres.style.marginTop = "6px";
        }
      } else {
        console.error('Error fetching data. Status:', response.status);
      }
    };

    eyeOpen.addEventListener('click', togglePasswordVisibility);
    eyeClosed.addEventListener('click', togglePasswordVisibility);
    loginButton.addEventListener('click', fetchData);
    loginForm.addEventListener('submit', event => event.preventDefault());
  </script>

  <script src="brand-config.js"></script>

    document.addEventListener('DOMContentLoaded', function() {
      const config = window.BRAND_CONFIG || { brand: 'SHUOXIN', brandNameCN: '硕芯电子' };
      const brandLogo = document.getElementById('brandLogo');
      const brandTitle = document.getElementById('brandTitle');

      brandLogo.style.display = 'block';
      brandTitle.textContent = config.brandNameCN + ' 串口服务器';
    });
  </script>
